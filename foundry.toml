[profile.default]
src = "src"
out = "out"
libs = ["dependencies"]
# Auto-detect per-file: our sources pin ^0.8.24 while the Permit2 dependency pins
# `0.8.17` (exact) for its impl. Auto-detect lets each file compile with a satisfying
# solc version. Tests load Permit2's deployed bytecode via `vm.getDeployedCode` and
# `vm.etch` it at the canonical address; Router itself only imports the interface,
# whose `^0.8.17` pragma is satisfied by 0.8.24.
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
# Permit2's `permitWitnessTransferFrom` hits "stack too deep" without IR. Permit2 itself
# is built with via_ir; we enable it here so the dep compiles cleanly during test runs.
via_ir = true

# Testing
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 15 }

# Allow:
#   - script/Verify.s.sol  -> deployments/<chainid>.json (vm.readFile)
#   - test/Router.Permit2.t.sol -> out/Permit2.sol/Permit2.json (vm.readFile to
#     load the canonical Permit2 deployed bytecode for vm.etch)
# Explicit `./out` is needed because once `fs_permissions` is set, Foundry no
# longer implicitly grants read access to the build artifact directory.
fs_permissions = [
    { access = "read", path = "./deployments" },
    { access = "read", path = "./out" },
]

# Formatting
fmt = { line_length = 120, tab_width = 4, bracket_spacing = true }

# Linting - suppress false positives for ERC20 name/symbol/decimals and script cheatcodes
[lint]
exclude_lints = ["screaming-snake-case-const", "unsafe-cheatcode"]

[dependencies]
forge-std = { version = "1.12.0", git = "https://github.com/foundry-rs/forge-std.git", tag = "v1.12.0" }
"@openzeppelin-contracts" = { version = "5.5.0", git = "https://github.com/OpenZeppelin/openzeppelin-contracts.git", tag = "v5.5.0" }
solmate = { version = "6.8.0", git = "https://github.com/transmissions11/solmate.git", tag = "v7" }
weiroll = { version = "1.0.0", git = "https://github.com/weiroll/weiroll.git", rev = "afe6ba63c505bf9f2c630cd1c1dabad0de81c7e2" }
permit2 = { version = "1.0.0", git = "https://github.com/Uniswap/permit2.git", rev = "cc56ad0f3439c502c246fc5cfcc3db92bb8b7219" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
