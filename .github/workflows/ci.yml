name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Check formatting
        run: forge fmt --check

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Build (required for Slither)
        run: forge build

      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        continue-on-error: true
        with:
          fail-on: none
          sarif: results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

  deploy-dry-run:
    name: Deploy Script Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Dry run Deploy.s.sol
        run: forge script script/Deploy.s.sol --dry-run || true

      - name: Dry run DeployCreate3.s.sol
        run: forge script script/DeployCreate3.s.sol --dry-run || true
